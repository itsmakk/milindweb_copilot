  <style>
    .cal-hero { padding-top: clamp(3rem, 7vw, 5rem); }

    .cy-controls { display: flex; flex-wrap: wrap; justify-content: center; gap: var(--s-3); margin: var(--s-5) 0 var(--s-4); }
    .cy-controls select, .cy-controls button {
      font-family: inherit; font-size: 0.95rem;
      padding: 8px 14px; border-radius: var(--r-sm);
      border: 1px solid var(--border-2);
      background: var(--surface-2); color: var(--text-1);
      cursor: pointer; transition: var(--t-fast, 0.2s ease);
    }
    .cy-controls select:hover, .cy-controls button:hover { border-color: var(--accent); color: var(--accent); }
    .cy-controls button { display: inline-flex; align-items: center; gap: 6px; }
    .cy-controls button:focus-visible, .cy-controls select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .cy-calendar { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--s-3); padding: var(--s-4) 0; }
    .cy-month {
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--surface-1);
    }
    .cy-month h2 {
      margin: 0; padding: 8px 6px; font-size: 0.95rem;
      text-align: center; font-weight: 600; color: #0f172a;
    }
    .cy-month table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .cy-month th, .cy-month td { padding: 4px; text-align: center; min-width: 24px; }
    .cy-month th { font-weight: 600; color: var(--text-2); }
    .cy-month td { color: var(--text-1); border-top: 1px solid var(--border-1); }

    .cy-m0 h2  { background: #bfdbfe; }
    .cy-m1 h2  { background: #a5f3fc; }
    .cy-m2 h2  { background: #bbf7d0; }
    .cy-m3 h2  { background: #d9f99d; }
    .cy-m4 h2  { background: #fef08a; }
    .cy-m5 h2  { background: #fde68a; }
    .cy-m6 h2  { background: #fdba74; }
    .cy-m7 h2  { background: #fca5a5; }
    .cy-m8 h2  { background: #fbcfe8; }
    .cy-m9 h2  { background: #f9a8d4; }
    .cy-m10 h2 { background: #ddd6fe; }
    .cy-m11 h2 { background: #e9d5ff; }

    [data-theme="dark"] .cy-month h2 { color: #0b1020; }
    [data-theme="dark"] .cy-month { background: rgba(255,255,255,0.03); }

    .cy-sunday { color: #ef4444; font-weight: 700; }
    .cy-weekend { background: rgba(56, 189, 248, 0.12); color: #ef4444; font-weight: 700; }
    .cy-holiday { background: rgba(239, 68, 68, 0.16) !important; color: #ef4444 !important; font-weight: 700; }

    .cy-holiday-list-wrap { margin-top: var(--s-6); }
    .cy-holiday-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--s-3);
      padding: var(--s-4);
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
    }
    .cy-holiday-item { font-size: 0.92rem; color: var(--text-2); padding: 4px 0; }
    .cy-holiday-date { display: inline-block; min-width: 70px; font-weight: 700; color: var(--accent); }

    .year-display { font-size: 2.4rem; font-weight: 800; margin: 0; text-align: center; }
    .year-display span { background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  </style>
</head>
<body>

  <a class="skip-link" href="#main">Skip to main content</a>
  <div id="header"></div>

  <main id="main">

    <section class="hero cal-hero">
      <div class="container container--narrow text-center">
        <span class="hero__badge reveal"><i class="fas fa-calendar-days" aria-hidden="true"></i> Year Calendar</span>
        <h1 class="reveal" data-delay="1">Every month, every <span class="text-grad">holiday</span> — at a glance</h1>
        <p class="reveal" data-delay="2">Plan ahead with a full-year calendar highlighting Indian public holidays, second &amp; fourth Saturdays, and Sundays.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="cy-controls reveal" aria-label="Year navigation">
          <button type="button" onclick="cyPrevYear()" aria-label="Previous year"><i class="fas fa-backward-step" aria-hidden="true"></i> Prev</button>
          <label class="visually-hidden" for="cy-yearSelect">Year</label>
          <select id="cy-yearSelect" onchange="cyUpdateCalendar()" aria-label="Select year"></select>
          <button type="button" onclick="cyNextYear()" aria-label="Next year">Next <i class="fas fa-forward-step" aria-hidden="true"></i></button>
        </div>

        <h2 class="year-display reveal">Calendar Year — <span id="cy-dynamicYear"></span></h2>

        <div class="cy-calendar reveal" id="cy-calendar" role="grid" aria-label="Monthly calendar"></div>

        <div class="cy-holiday-list-wrap reveal">
          <h3 style="text-align:center; margin: 0 0 var(--s-3);">Holidays List — <span id="cy-dynamicYear2"></span></h3>
          <div class="cy-holiday-list" id="cy-holidayList" aria-live="polite"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="footer"></div>

  <button id="themeToggle" type="button" aria-label="Toggle theme">
    <i class="fas fa-moon" aria-hidden="true"></i>
  </button>

  <script src="config.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/insforge-client.js" defer></script>
    <script src="js/headerfooter.js" defer></script>

  <script>
    /* === Original calendar logic preserved verbatim. === */
    let cyHolidays = {};

    const cyMonthNames = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];
    const cyMonthAbbr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    const cyYearSelect = document.getElementById("cy-yearSelect");
    const thisYear = new Date().getFullYear();
    for (let y = thisYear-5; y <= thisYear+5; y++) {
      let opt = document.createElement("option");
      opt.value = y;
      opt.text = y;
      if (y === thisYear) opt.selected = true;
      cyYearSelect.add(opt);
    }

    function cyGenerateYearCalendar(year) {
      document.getElementById("cy-dynamicYear").innerText = year;
      document.getElementById("cy-dynamicYear2").innerText = year;

      const calendar = document.getElementById("cy-calendar");
      calendar.innerHTML = "";

      let holidayDates = {};
      if (cyHolidays[year]) {
        cyHolidays[year].forEach(h => holidayDates[h.date] = h.name);
      }

      for (let m = 0; m < 12; m++) {
        let div = document.createElement("div");
        div.className = "cy-month cy-m"+m;

        let h2 = document.createElement("h2");
        h2.innerText = cyMonthNames[m];
        div.appendChild(h2);

        let table = document.createElement("table");
        let header = "<tr><th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th></tr>";
        table.innerHTML = header;

        const firstDay = new Date(year, m, 1).getDay();
        const daysInMonth = new Date(year, m+1, 0).getDate();

        let row = "<tr>";
        for (let i=0; i<firstDay; i++) row += "<td></td>";

        for (let d=1; d<=daysInMonth; d++) {
          let dateKey = String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
          let day = new Date(year, m, d).getDay();
          let cls = "";
          let tooltip = "";

          if (day === 0) cls = "cy-sunday";

          if (day === 6) {
            let weekNum = Math.floor((d + firstDay - 1) / 7) + 1;
            if (weekNum === 2 || weekNum === 4) cls = "cy-weekend";
          }

          if (holidayDates[dateKey]) {
            cls = "cy-holiday";
            tooltip = `${d} ${cyMonthAbbr[m]} ${year} - ${holidayDates[dateKey]}`;
          } else {
            tooltip = `${d} ${cyMonthAbbr[m]} ${year}`;
          }

          row += `<td class="${cls}" title="${tooltip}">${d}</td>`;
          if (day === 6) { row += "</tr><tr>"; }
        }
        row += "</tr>";

        table.innerHTML += row;
        div.appendChild(table);
        calendar.appendChild(div);
      }

      const list = document.getElementById("cy-holidayList");
      list.innerHTML = "";
      if (cyHolidays[year]) {
        let colDiv;
        cyHolidays[year].forEach((h, idx) => {
          if (idx % 6 === 0) {
            colDiv = document.createElement("div");
            colDiv.className = "cy-holiday-column";
            list.appendChild(colDiv);
          }

          let [mm, dd] = h.date.split("-");
          let formatted = parseInt(dd) + " " + cyMonthAbbr[parseInt(mm)-1];

          let item = document.createElement("div");
          item.className = "cy-holiday-item";
          item.innerHTML = `<span class="cy-holiday-date" title="${formatted} ${year} - ${h.name}">${formatted}</span> ${h.name}`;
          colDiv.appendChild(item);
        });
      }
    }

    function cyUpdateCalendar(){ cyGenerateYearCalendar(parseInt(cyYearSelect.value)); }
    function cyPrevYear(){ cyYearSelect.value = parseInt(cyYearSelect.value)-1; cyUpdateCalendar(); }
    function cyNextYear(){ cyYearSelect.value = parseInt(cyYearSelect.value)+1; cyUpdateCalendar(); }

    fetch("data/holidays.json")
      .then(r=>r.json())
      .then(data=>{ cyHolidays=data; cyUpdateCalendar(); })
      .catch(()=>cyUpdateCalendar());
  </script>
