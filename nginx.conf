server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        image/x-icon;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # Cache static assets for 1 year (file names are immutable on this site)
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Cache HTML for 1 hour, must revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # .well-known must be served as-is (security.txt, etc.)
    location ^~ /.well-known/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Sitemap and robots
    location = /sitemap.xml  { add_header Content-Type application/xml; }
    location = /robots.txt  { add_header Cache-Control "public, max-age=86400"; }
    location = /site.webmanifest { add_header Content-Type application/manifest+json; }

    # SPA-friendly fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Block hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /index.html;
    location = /404.html {
        add_header Cache-Control "no-store";
        internal;
    }
}
